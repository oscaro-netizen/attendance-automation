services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile

    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:?SLACK_SIGNING_SECRET is required}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID:-}
      SLACK_TIMESTAMP_TOLERANCE_SECONDS: ${SLACK_TIMESTAMP_TOLERANCE_SECONDS:-300}
      TIMETRACK_BASE_URL: ${TIMETRACK_BASE_URL:-https://time.marsos.io}
      TIMETRACK_TIMEOUT_SECONDS: ${TIMETRACK_TIMEOUT_SECONDS:-15}
      DATABASE_PATH: /app/data/employees.db
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

    volumes:
      # Employee tokens must survive container replacement.
      - token_data:/app/data

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  token_data:
